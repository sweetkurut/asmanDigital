services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=*
    env_file:
      - .env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge